<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTC Metals</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0f1115; color: #e6e8eb; padding: 32px; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; letter-spacing: -0.3px; }
  .sub { color: #8a909a; font-size: 13px; margin-bottom: 28px; }
  .card { background: #181b22; border: 1px solid #262b35; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #8a909a; margin-bottom: 16px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  input, select { background: #0f1115; border: 1px solid #2c323d; color: #e6e8eb; padding: 10px 12px; border-radius: 8px; font-size: 14px; flex: 1; min-width: 120px; }
  button { background: #d4af37; color: #1a1a1a; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
  button:hover { background: #e6c558; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: #8a909a; font-weight: 500; padding: 8px 10px; border-bottom: 1px solid #262b35; font-size: 11px; text-transform: uppercase; }
  td { padding: 11px 10px; border-bottom: 1px solid #1d2129; }
  .badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .active { background: #1a3a2a; color: #4ade80; }
  .withdrawn { background: #3a1a1a; color: #f87171; }
  .id { color: #6b7280; font-family: monospace; font-size: 11px; }
</style>
</head>
<body>
  <h1>OTC Metals Platform</h1>
  <div class="sub">Внебиржевые сделки с драгоценными металлами</div>

  <div class="card">
    <h2>Опубликовать оффер</h2>
    <div class="row">
      <select id="metal">
        <option value="gold">Золото</option>
        <option value="silver">Серебро</option>
        <option value="platinum">Платина</option>
        <option value="palladium">Палладий</option>
      </select>
      <input id="price" type="number" placeholder="Цена ₽/г">
      <input id="volume" type="number" placeholder="Объём, г">
      <button onclick="publish()">Опубликовать</button>
    </div>
    <div id="msg" style="margin-top:12px;font-size:13px;color:#8a909a;"></div>
  </div>

  <div class="card">
    <h2>Активные офферы</h2>
    <table>
      <thead><tr><th>ID</th><th>Металл</th><th>Цена</th><th>Объём</th><th>Статус</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

<script>
const API = "";
async function load() {
  const r = await fetch(API + "/offers");
  const d = await r.json();
  const rows = d.offers.map(o => `
    <tr>
      <td class="id">${o.offer_id.slice(0,8)}</td>
      <td>${o.metal ?? "—"}</td>
      <td>${o.price ?? "—"}</td>
      <td>${o.volume ?? "—"}</td>
      <td><span class="badge ${o.state}">${o.state}</span></td>
      <td>${o.state === "active" ? `<button onclick="withdraw('${o.offer_id}')" style="background:#2c323d;color:#e6e8eb;padding:5px 12px;">Снять</button>` : ""}</td>
    </tr>`).join("");
  document.getElementById("rows").innerHTML = rows;
}
async function publish() {
  const body = {
    offerId: crypto.randomUUID(),
    metal: document.getElementById("metal").value,
    price: Number(document.getElementById("price").value),
    volume: Number(document.getElementById("volume").value)
  };
  const r = await fetch(API + "/offer/publish", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
  const d = await r.json();
  document.getElementById("msg").textContent = d.ok ? "Опубликовано, версия " + d.version : "Ошибка: " + d.error;
  load();
}
async function withdraw(id) {
  await fetch(API + "/offer/withdraw", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ offerId: id }) });
  load();
}
load();
</script>
</body>
</html>
